<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fossil 000 — Nostalgic Collapse</title>
<style>
html,body{margin:0;height:100%;background:#090b12;color:#eef;font-family:system-ui}
canvas{display:block;width:100%;height:100%}
#panel{position:fixed;left:18px;top:18px;background:#111827dd;border:1px solid #ffffff22;border-radius:16px;padding:14px 16px;max-width:310px}
h1{font-size:18px;margin:0 0 7px}p{font-size:13px;line-height:1.35;margin:5px 0;color:#cbd5e1}
b{color:white}.meter{font-variant-numeric:tabular-nums;color:#fca5a5}
button{margin-top:8px;border:0;border-radius:999px;padding:8px 12px;background:#e5e7eb;color:#111}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel"><h1>Fossil 000: Nostalgic Collapse</h1>
<p>Every encounter permanently strengthens a pairwise bond. Nothing forgets.</p>
<p>Total remembered affinity: <b class="meter" id="m">0</b></p>
<p>Cause of death: eventually, everything misses everything.</p>
<button id="reset">Reset fossil</button></div>
<script>
const c=document.querySelector('#c'),x=c.getContext('2d'),N=36;
let P,M,last=0;
function resize(){c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
addEventListener('resize',resize);resize();
function init(){P=[...Array(N)].map((_,i)=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*25,vy:(Math.random()-.5)*25,h:i*360/N}));M=new Float32Array(N*N)}
document.querySelector('#reset').onclick=init;init();
function step(dt){
 for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
  let a=P[i],b=P[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.001;
  if(d<85){M[i*N+j]+=dt*.16;M[j*N+i]=M[i*N+j]}
  let f=M[i*N+j]*18/(d+18),fx=f*dx/d,fy=f*dy/d;
  a.vx+=fx*dt;a.vy+=fy*dt;b.vx-=fx*dt;b.vy-=fy*dt;
 }
 for(const p of P){p.vx*=Math.exp(-.18*dt);p.vy*=Math.exp(-.18*dt);p.x+=p.vx*dt;p.y+=p.vy*dt;
  if(p.x<0||p.x>innerWidth)p.vx*=-.8;if(p.y<0||p.y>innerHeight)p.vy*=-.8;p.x=Math.max(0,Math.min(innerWidth,p.x));p.y=Math.max(0,Math.min(innerHeight,p.y))}
}
function draw(){
 x.fillStyle='#090b12';x.fillRect(0,0,innerWidth,innerHeight);
 for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){let v=M[i*N+j];if(v>.02){x.strokeStyle=`rgba(255,150,180,${Math.min(.22,v*.08)})`;x.beginPath();x.moveTo(P[i].x,P[i].y);x.lineTo(P[j].x,P[j].y);x.stroke()}}
 for(const p of P){x.fillStyle=`hsl(${p.h} 75% 65%)`;x.beginPath();x.arc(p.x,p.y,5,0,7);x.fill()}
 let total=0;for(const v of M)total+=v;document.querySelector('#m').textContent=total.toFixed(1)
}
function loop(t){let dt=Math.min(.03,(t-last)/1000||.016);last=t;step(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script></body></html>
